<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>MDX</title>
    <style>
      #loading { display: flex; align-items: center; justify-content: center; height: 100vh; font-size: 16px; color: #888; }
      #error { display: none; align-items: center; justify-content: center; height: 100vh; font-size: 14px; color: #d93025; flex-direction: column; gap: 8px; padding: 20px; text-align: center; white-space: pre-wrap; font-family: monospace; }
    </style>
  </head>
  <body>
    <div id="loading">Loading MDX ...</div>
    <div id="error"></div>
    <div id="app"></div>
    <script>
      window.addEventListener('error', function(e) {
        var el = document.getElementById('error');
        el.style.display = 'flex';
        el.textContent = 'Error: ' + (e.message || e) + '\n\nFile: ' + (e.filename || 'unknown') + '\nLine: ' + (e.lineno || '?') + ':' + (e.colno || '?');
        document.getElementById('loading').style.display = 'none';
      });
      window.addEventListener('unhandledrejection', function(e) {
        var el = document.getElementById('error');
        el.style.display = 'flex';
        el.textContent = 'Unhandled Rejection: ' + (e.reason?.message || e.reason || 'unknown');
        document.getElementById('loading').style.display = 'none';
      });
      // Hide loading once Vue mounts
      var observer = new MutationObserver(function() {
        if (document.getElementById('app').children.length > 0) {
          document.getElementById('loading').style.display = 'none';
          observer.disconnect();
        }
      });
      observer.observe(document.getElementById('app'), { childList: true });
    </script>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
