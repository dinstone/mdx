# This file contains the configuration for this project.
# When you update `info` or `fileAssociations`, run `wails3 task common:update:build-assets` to update the assets.
# Note that this will overwrite any changes you have made to the assets.
version: "3"

# This information is used to generate the build assets.
info:
  companyName: "dinstone ltd" # The name of the company
  productName: "MDX" # The name of the application
  productIdentifier: "com.dinstone.mdx" # The unique product identifier
  description: "A Markdown editor built with Wails 3" # The application description
  copyright: "(c) 2025, dinstone ltd" # Copyright text
  comments: "MDXor Markdown Editor" # Comments
  version: "0.8.0" # The application version
  # cfBundleIconName: "appicon" # The macOS icon name in Assets.car icon bundles (optional)
  #                               # Should match the name of your .icon file without the extension
  #                               # If not set and Assets.car exists, defaults to "appicon"

# iOS build configuration (uncomment to customise iOS project generation)
# Note: Keys under `ios` OVERRIDE values under `info` when set.
# ios:
#   # The iOS bundle identifier used in the generated Xcode project (CFBundleIdentifier)
#   bundleID: "com.mycompany.myproduct"
#   # The display name shown under the app icon (CFBundleDisplayName/CFBundleName)
#   displayName: "My Product"
#   # The app version to embed in Info.plist (CFBundleShortVersionString/CFBundleVersion)
#   version: "0.0.1"
#   # The company/organisation name for templates and project settings
#   company: "My Company"
#   # Additional comments to embed in Info.plist metadata
#   comments: "Some Product Comments"

# Dev mode configuration
dev_mode:
  root_path: .
  log_level: warn
  debounce: 1000
  ignore:
    dir:
      - .git
      - node_modules
      - frontend
      - ../web/node_modules
      - ../web/bindings
      - .mdx-images
      - bin
    file:
      - .DS_Store
      - .gitignore
      - .gitkeep
      - "*_test.go"
    watched_extension:
      - "*.go"
    git_ignore: true
  executes:
    - cmd: wails3 task common:generate:bindings
      type: blocking
    - cmd: wails3 task common:dev:frontend
      type: background
    - cmd: wails3 build DEV=true
      type: blocking
    - cmd: wails3 task run
      type: primary
# File Associations
# More information at: https://v3.wails.io/noit/done/yet
fileAssociations:
  - ext: md
    name: Markdown Document
    description: Markdown Document File
    iconName: appicon
    role: Editor
  - ext: markdown
    name: Markdown Document
    description: Markdown Document File
    iconName: appicon
    role: Editor

# Other data
other:
  - name: My Other Data
