# =============================================================================
# MDX · GitHub Actions CI/CD
#
# 触发时机：
#   1) 推送 Tag（v*.*.*）→ 自动构建 macOS / Windows 两平台、打包并发布 GitHub Release
#      （含应用内更新所需的 macOS 按架构 .zip + SHA256SUMS）
#   2) 合并 / 推送 master → 仅做编译 + 测试验证（不发布 Release）
#
# 构建链路（与本地一致）：
#   wails3(task) → build:frontend(pnpm build @mdx/web，源码经 vite alias 直引
#   packages/core/src) → go build(CGO) → 打包成 .app/.exe/二进制
#
# 重要约定（否则应用内更新器拿不到包）：
#   - 打 Tag 前请先把根 package.json 的 version 改到对应版本，
#     因为二进制里的版本号由根 package.json 经 ldflags 注入，
#     更新器会比较“已装版本 < Release Tag”，不一致会误判。
#   - macOS 产物必须按架构命名：MDX-darwin-arm64.zip / MDX-darwin-amd64.zip，
#     内含 .app 顶层目录（更新器 DefaultAssetMatcher 按 platform+arch 匹配）。
#   - 如需让更新器校验完整性，请在 apps/wails/main.go 的 github.New 里加
#     ChecksumAsset: "SHA256SUMS"（本流程会生成该侧车文件）。
# =============================================================================

name: Release

on:
  push:
    tags:
      - "v*"          # 打 Tag → 构建 + 发布
    branches:
      - master        # 合并到 master → 仅 CI 验证

# 发布 Release 需要写权限
permissions:
  contents: write

# 避免同一 ref 的多次运行互相覆盖
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  # 与 apps/wails/go.mod 中 wails v3 版本保持一致
  WAILS3_VERSION: v3.0.0-alpha2.111
  GO_VERSION: "1.25"
  NODE_VERSION: "22"
  PNPM_VERSION: "9"

jobs:
  # ---------------------------------------------------------------------------
  # 测试（所有 push 都跑，快速暴露回归）
  # ---------------------------------------------------------------------------
  test:
    name: Test (core)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - name: Run core unit tests
        run: pnpm --filter @mdx/core test run

  # ---------------------------------------------------------------------------
  # 构建矩阵：macOS 与 Windows 两个平台原生编译（Wails 需要本机工具链，无法纯交叉；
  # Linux 桌面构建已移除）
  # ---------------------------------------------------------------------------
  build:
    name: Build (${{ matrix.os }})
    needs: test
    strategy:
      fail-fast: false          # 某个平台失败不影响其它平台
      matrix:
        os: [macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      # 安装 wails3 CLI（构建/打包脚本依赖它做 task 调度与代码生成）
      - name: Install wails3 CLI
        run: go install github.com/wailsapp/wails/v3/cmd/wails3@${{ env.WAILS3_VERSION }}

      - name: Add GOBIN to PATH
        run: echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"
        shell: bash

      # Windows NSIS 安装包构建需要 makensis（best-effort，失败不影响 .exe 产物）
      - name: Install NSIS (Windows)
        if: runner.os == 'Windows'
        run: choco install nsis -y

      # 安装整个 workspace 依赖（含 @mdx/web / @mdx/core）
      - name: Install frontend deps
        run: pnpm install --frozen-lockfile

      # 前端构建统一交给 wails3 task 内部完成，且只构建一次：
      #   - macOS：darwin:package:universal 经 build:universal 的【顶层依赖】
      #     common:build:frontend 构建前端（不再嵌套在双架构 build 里），run:once 不会
      #     跳过它，前端只构建一次。
      #   - Windows：build:native 依赖 common:build:frontend，单架构单次调用，同样一次。
      # 此前这里用显式 shell 跑 pnpm build + cp，会与 task 内的 common:build:frontend
      # 重复构建一次前端（约多花一倍 vite 时间），现已移除该重复。
      # 前端源码在 apps/web，由 common:build:frontend 执行 pnpm build 并拷贝到
      # apps/wails/frontend/dist（main.go:17 的 //go:embed all:frontend/dist 需要）。

      # ---- macOS：构建 universal .app 并拆成按架构命名的 zip（更新器需要）----
      - name: Build & package (macOS universal)
        if: runner.os == 'macOS'
        working-directory: apps/wails
        run: wails3 task darwin:package:universal

      - name: Package macOS artifacts
        if: runner.os == 'macOS'
        shell: bash
        run: |
          set -euo pipefail
          cd apps/wails/bin
          APP=MDX.app
          # 真瘦身：universal 二进制 ≈ arm64 + amd64 之和（实测约 33MB）。
          # 拆成单架构后各自只有一半体积，arm64 用户下载≈17MB 而非 33MB。
          # 关键：替换 .app 内的二进制后，原 ad-hoc 签名失效，必须重新 codesign，
          # 否则用户打开会报“app 已损坏”。lipo 对 Intel 切片命名为 x86_64（非 amd64）。
          for SLICE in arm64 x86_64; do
            ZIPARCH=$( [ "$SLICE" = "x86_64" ] && echo amd64 || echo arm64 )
            # 1) 复制一份 app bundle 作为该架构的载体
            cp -R "$APP" "MDX-${SLICE}.app"
            # 2) 从 universal 二进制取出单架构切片
            lipo -extract "$SLICE" "$APP/Contents/MacOS/MDX" \
              -output "MDX-${SLICE}.app/Contents/MacOS/MDX"
            # 3) 剥离本地符号进一步瘦身（构建时已带 -w -s，这里去非全局符号）
            strip -x "MDX-${SLICE}.app/Contents/MacOS/MDX"
            # 4) 重签：替换二进制后签名必须更新，否则运行报“已损坏”
            codesign --force --deep --sign - "MDX-${SLICE}.app"
            # 5) 打包，顶层即 MDX.app（更新器 DefaultAssetMatcher 期望的结构）
            ditto -c -k --keepParent "MDX-${SLICE}.app" "MDX-darwin-${ZIPARCH}.zip"
            rm -rf "MDX-${SLICE}.app"
          done
          mkdir -p "$GITHUB_WORKSPACE/dist-release/macOS"
          mv MDX-darwin-arm64.zip MDX-darwin-amd64.zip "$GITHUB_WORKSPACE/dist-release/macOS/"

      # ---- Windows：原生交叉编译（CGO 默认关闭，不需要 Docker）----
      - name: Build (Windows)
        if: runner.os == 'Windows'
        working-directory: apps/wails
        run: wails3 task build

      - name: Package Windows installer (best-effort)
        if: runner.os == 'Windows'
        continue-on-error: true
        working-directory: apps/wails
        run: wails3 task package        # 仅生成 NSIS 安装包，二进制已 build 过

      - name: Package Windows artifacts
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path "$env:GITHUB_WORKSPACE/dist-release/Windows" | Out-Null
          Compress-Archive -Path "apps/wails/bin/MDX.exe" -DestinationPath "$env:GITHUB_WORKSPACE/dist-release/Windows/MDX-windows-amd64.zip" -Force
          # 若存在 NSIS 安装包则一并收入（命名形如 *-installer.exe）
          $installer = Get-ChildItem -Path "apps/wails/bin" -Filter "*installer.exe" | Select-Object -First 1
          if ($installer) { Copy-Item $installer.FullName "$env:GITHUB_WORKSPACE/dist-release/Windows/" }

      # 上传本平台产物（release 任务会汇总）
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mdx-${{ matrix.os }}
          path: dist-release/${{ runner.os }}/*
          if-no-files-found: error
          retention-days: 7

  # ---------------------------------------------------------------------------
  # 发布：仅当推送 Tag 时运行，汇总两平台（macOS / Windows）产物 + 生成 SHA256SUMS 后建 Release
  # ---------------------------------------------------------------------------
  release:
    name: Publish GitHub Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./dl

      - name: Collect release assets
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release-assets
          # 展平：dl/mdx-<OS>/dist-release/<OS>/MDX-*.zip|tar.gz|deb
          find ./dl -type f \( -name "MDX-*" -o -name "*.deb" \) -exec cp {} release-assets/ \;
          echo "=== collected assets ==="
          ls -la release-assets

      - name: Generate SHA256SUMS
        shell: bash
        run: |
          set -euo pipefail
          cd release-assets
          sha256sum * > SHA256SUMS
          echo "=== SHA256SUMS ==="
          cat SHA256SUMS

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: MDX ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            release-assets/*
