# =============================================================================
# MDX · GitHub Actions CI/CD
#
# 触发时机：
#   1) 推送 Tag（v*.*.*）→ 自动构建 macOS / Windows 两平台、打包并发布 GitHub Release
#      （含应用内更新所需的 macOS 按架构 .zip + SHA256SUMS）
#   2) 合并 / 推送 master → 仅做编译 + 测试验证（不发布 Release）
#
# 构建链路（与本地一致）：
#   wails3(task) → build:frontend(pnpm build @mdx/web，源码经 vite alias 直引
#   packages/core/src) → go build(CGO) → 打包成 .app/.exe/二进制
#
# 重要约定（否则应用内更新器拿不到包）：
#   - 打 Tag 前请先把根 package.json 的 version 改到对应版本，
#     因为二进制里的版本号由根 package.json 经 ldflags 注入，
#     更新器会比较“已装版本 < Release Tag”，不一致会误判。
#   - macOS 产物必须按架构命名：MDX-darwin-arm64.zip / MDX-darwin-amd64.zip，
#     内含 .app 顶层目录（更新器 DefaultAssetMatcher 按 platform+arch 匹配）。
#   - 如需让更新器校验完整性，请在 apps/wails/main.go 的 github.New 里加
#     ChecksumAsset: "SHA256SUMS"（本流程会生成该侧车文件）。
# =============================================================================

name: Release

on:
  push:
    tags:
      - "v*"          # 打 Tag → 构建 + 发布
    branches:
      - master        # 合并到 master → 仅 CI 验证

# 发布 Release 需要写权限
permissions:
  contents: write

# 避免同一 ref 的多次运行互相覆盖
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  # 与 apps/wails/go.mod 中 wails v3 版本保持一致
  WAILS3_VERSION: v3.0.0-alpha2.111
  GO_VERSION: "1.25"
  NODE_VERSION: "22"
  PNPM_VERSION: "9"

jobs:
  # ---------------------------------------------------------------------------
  # 测试（所有 push 都跑，快速暴露回归）
  # ---------------------------------------------------------------------------
  test:
    name: Test (core)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - name: Run core unit tests
        run: pnpm --filter @mdx/core test run

  # ---------------------------------------------------------------------------
  # 构建矩阵：macOS 与 Windows 两个平台原生编译（Wails 需要本机工具链，无法纯交叉；
  # Linux 桌面构建已移除）
  # ---------------------------------------------------------------------------
  build:
    name: Build (${{ matrix.os }})
    needs: test
    strategy:
      fail-fast: false          # 某个平台失败不影响其它平台
      matrix:
        os: [macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      # 安装 wails3 CLI（构建/打包脚本依赖它做 task 调度与代码生成）
      - name: Install wails3 CLI
        run: go install github.com/wailsapp/wails/v3/cmd/wails3@${{ env.WAILS3_VERSION }}

      - name: Add GOBIN to PATH
        run: echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"
        shell: bash

      # Windows NSIS 安装包构建需要 makensis（best-effort，失败不影响 .exe 产物）
      - name: Install NSIS (Windows)
        if: runner.os == 'Windows'
        run: choco install nsis -y

      # 安装整个 workspace 依赖（含 @mdx/web / @mdx/core）
      - name: Install frontend deps
        run: pnpm install --frozen-lockfile

      # 构建前端并拷贝到 Go embed 目录（apps/wails/frontend/dist）。
      #
      # 关键点：这里用【显式 shell 命令】完成，而不是依赖 wails3 的
      # common:build:frontend task。原因（本地已复现）：
      #   common:build:frontend 标了 run:once，而 darwin:package:universal 会为
      #   amd64 / arm64 各触发一次 build:frontend。wake 的 run:once 在“同一 task 被
      #   多个架构的构建共享依赖”场景下，会把该 task 的 cmds（pnpm build + 拷贝）
      #   整条跳过——单架构 darwin:build:native 正常，但双架构 package:universal 下
      #   build:frontend 的拷贝步被吞，apps/wails/frontend/dist 从未生成，go build
      #   报 “pattern all:frontend/dist: no matching files found”。
      #   显式 shell 不受 wake run:once 影响，保证 embed 目录一定存在；后续
      #   package:universal 无论是否跳过其 build:frontend 依赖，go build 都能找到文件。
      #
      # 前端【源码】在 apps/web：apps/web 用 Vite 构建，再把产物拷贝到
      # apps/wails/frontend/dist。为什么不能只跑 `pnpm build`：main.go:17 用
      #   //go:embed all:frontend/dist
      # 把前端打进二进制，而 embed 路径是【相对于 main.go 所在目录】解析的，即
      # apps/wails/frontend/dist —— 不是 apps/web/dist。裸跑 pnpm build 只产出
      # apps/web/dist，不做拷贝就会触发上面的嵌入错误。
      - name: Build frontend (embed assets)
        shell: bash
        run: |
          set -euo pipefail
          cd "$GITHUB_WORKSPACE/apps/wails"
          # 1) 生成 Go<->TS bindings（go build 依赖；CI 日志已验证可正常生成）
          wails3 generate bindings \
            -f '-tags production -trimpath -buildvcs=false -ldflags="-w -s -X '\''mdx/internal/service.appVersion=0.8.2'\''"' \
            -clean=true -ts -i -d ../web/bindings
          # 2) 构建前端（源码在 apps/web）并拷贝到 Go embed 目录
          ( cd ../web && pnpm run build )
          rm -rf frontend/dist
          cp -r ../web/dist frontend/

      # ---- macOS：构建 universal .app 并拆成按架构命名的 zip（更新器需要）----
      # 选完整 Xcode：wails3 generate icons 内部调用 actool（Xcode 资源目录编译器），
      # 而 macos runner 的 DEVELOPER_DIR 默认指向 Command Line Tools（不含 actool），
      # 直接跑会报 “failed to run actool: exit status 1”。切到完整 Xcode 后 actool
      # 才可用，图标与 Assets.car 才能正常生成（Assets.car 未提交，必须现生成）。
      - name: Select full Xcode (actool needs it)
        if: runner.os == 'macOS'
        run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

      - name: Build & package (macOS universal)
        if: runner.os == 'macOS'
        working-directory: apps/wails
        run: wails3 task darwin:package:universal

      - name: Package macOS artifacts
        if: runner.os == 'macOS'
        shell: bash
        run: |
          set -euo pipefail
          cd apps/wails/bin
          # 同一定点 universal 二进制对 arm64 / amd64 都能跑，复制成两份按架构命名
          # ditto --keepParent 保证解压后顶层就是 MDX.app（更新器期望的结构）
          ditto -c -k --keepParent MDX.app MDX-darwin-arm64.zip
          cp MDX-darwin-arm64.zip MDX-darwin-amd64.zip
          mkdir -p "$GITHUB_WORKSPACE/dist-release/macOS"
          mv MDX-darwin-arm64.zip MDX-darwin-amd64.zip "$GITHUB_WORKSPACE/dist-release/macOS/"

      # ---- Windows：原生交叉编译（CGO 默认关闭，不需要 Docker）----
      - name: Build (Windows)
        if: runner.os == 'Windows'
        working-directory: apps/wails
        run: wails3 task build

      - name: Package Windows installer (best-effort)
        if: runner.os == 'Windows'
        continue-on-error: true
        working-directory: apps/wails
        run: wails3 task package        # 仅生成 NSIS 安装包，二进制已 build 过

      - name: Package Windows artifacts
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path "$env:GITHUB_WORKSPACE/dist-release/Windows" | Out-Null
          Compress-Archive -Path "apps/wails/bin/MDX.exe" -DestinationPath "$env:GITHUB_WORKSPACE/dist-release/Windows/MDX-windows-amd64.zip" -Force
          # 若存在 NSIS 安装包则一并收入（命名形如 *-installer.exe）
          $installer = Get-ChildItem -Path "apps/wails/bin" -Filter "*installer.exe" | Select-Object -First 1
          if ($installer) { Copy-Item $installer.FullName "$env:GITHUB_WORKSPACE/dist-release/Windows/" }

      # 上传本平台产物（release 任务会汇总）
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mdx-${{ matrix.os }}
          path: dist-release/${{ runner.os }}/*
          if-no-files-found: error
          retention-days: 7

  # ---------------------------------------------------------------------------
  # 发布：仅当推送 Tag 时运行，汇总两平台（macOS / Windows）产物 + 生成 SHA256SUMS 后建 Release
  # ---------------------------------------------------------------------------
  release:
    name: Publish GitHub Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./dl

      - name: Collect release assets
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release-assets
          # 展平：dl/mdx-<OS>/dist-release/<OS>/MDX-*.zip|tar.gz|deb
          find ./dl -type f \( -name "MDX-*" -o -name "*.deb" \) -exec cp {} release-assets/ \;
          echo "=== collected assets ==="
          ls -la release-assets

      - name: Generate SHA256SUMS
        shell: bash
        run: |
          set -euo pipefail
          cd release-assets
          sha256sum * > SHA256SUMS
          echo "=== SHA256SUMS ==="
          cat SHA256SUMS

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: MDX ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            release-assets/*
